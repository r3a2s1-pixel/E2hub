<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E2hub | Internal Portal</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              DEFAULT: "#e50914",
              hover: "#b80710",
              soft: "#2d0f12"
            },
            dark: {
              bg: "#0a0a0a",
              panel: "#111111",
              card: "#151515",
              soft: "#1b1b1b",
              border: "#262626"
            }
          },
          boxShadow: {
            soft: "0 10px 30px rgba(0,0,0,0.20)",
            premium: "0 24px 70px rgba(0,0,0,0.35)"
          }
        }
      }
    };
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

  <style>
    body { background-color: #0a0a0a; color: #ffffff; font-family: 'Inter', sans-serif; }
    .fade-in { animation: fadeIn .3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .project-card {
      background: linear-gradient(145deg, #151515 0%, #0d0d0d 100%);
      border: 1px solid #262626;
      transition: all 0.3s ease;
    }
    .project-card:hover { border-color: #e50914; transform: translateY(-4px); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    // Supabase Configuration
    const SUPABASE_URL = "https://ytyuigcylsjasiwneytt.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_oiuImVgo9JUTfTe5A6MNWw_y3OjqE7q";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const SECTIONS = [
      { id: "quotation_received", title: "Quotation Received", icon: "fa-envelope-open-text", profileKey: "quotation_received" },
      { id: "quotation_breakdown", title: "Cost Analysis", icon: "fa-calculator", profileKey: "quotation_breakdown" },
      { id: "inventory", title: "Inventory Control", icon: "fa-boxes-stacked", profileKey: "inventory" },
      { id: "project_status", title: "Project Status", icon: "fa-bars-progress", profileKey: "project_status" }
    ];

    const DEFAULT_LINKS = {
      quotation_received: "https://eumeconn-my.sharepoint.com/:f:/g/personal/mur_eumecon_ae/IgAPlhb8DCDaTZrB4UO3uEZPAeakBCVbYYxSNR3lBC_lae0?e=OKv4nz",
      quotation_breakdown: "https://eumeconn-my.sharepoint.com/:x:/g/personal/mur_eumecon_ae/IQAm8ZTtLMvkTLT09nEXPpXZAZY-QBduU8vIkv0phmrVIQ0",
      inventory: "https://eumeconn-my.sharepoint.com/:x:/g/personal/mur_eumecon_ae/IQCRw7fzXtuTRp-Gc88IMfzkAWkcBv0AOhzO6ORiLMER29Y",
      project_status: "#"
    };

    const PROJECTS_LIST = [
      "01-LULU ICAD Musaffah",
      "02-Y Tower Capital centre (ADNEC)",
      "03-Pixel Tower Reem",
      "04- LULU Hypermarket(MBZ)",
      "05-Y Tower - Al Nahyan - LuLu",
      "06-AL Falah Plaza Residentaial complex",
      "07- Y Tower Reem",
      "08-Forsan central mall",
      "09-Village mall",
      "10- Workers village"
    ];

    // Helpers
    function getInitials(name) {
      return (name || "").split(" ").slice(0, 2).map(word => word[0]?.toUpperCase() || "").join("");
    }

    function getSectionTitle(id) {
      return SECTIONS.find(s => s.id === id)?.title || id;
    }

    function normalizeLinks(rows) {
      const merged = { ...DEFAULT_LINKS };
      (rows || []).forEach(row => { merged[row.section_key] = row.url; });
      return merged;
    }

    function profileToPermissions(profile) {
      if (!profile) return [];
      return SECTIONS.filter(section => !!profile[section.profileKey]).map(section => section.id);
    }

    // Components
    const Notice = ({ notice }) => {
      if (!notice) return null;
      const tone = notice.type === "error" ? "border-red-500/30 bg-red-950/40 text-red-200" : "border-emerald-500/30 bg-emerald-950/30 text-emerald-200";
      const icon = notice.type === "error" ? "fa-circle-exclamation" : "fa-circle-check";
      return (
        <div className={`rounded-2xl border px-4 py-3 text-sm mb-6 ${tone}`}>
          <i className={`fa-solid ${icon} mr-2`}></i>{notice.text}
        </div>
      );
    };

    const StatCard = ({ title, value, icon, accent = "brand" }) => {
      const accentClass = accent === "brand" ? "text-brand bg-brand/10 border-brand/20" : "text-neutral-200 bg-dark-soft border-dark-border";
      return (
        <div className="rounded-3xl border border-dark-border bg-dark-card p-5 shadow-soft">
          <div className="flex items-start justify-between gap-4">
            <div>
              <p className="text-sm text-neutral-500">{title}</p>
              <p className="mt-2 text-2xl font-bold tracking-tight">{value}</p>
            </div>
            <div className={`h-11 w-11 rounded-2xl border flex items-center justify-center ${accentClass}`}><i className={`fa-solid ${icon}`}></i></div>
          </div>
        </div>
      );
    };

    const LoadingScreen = () => (
      <div className="min-h-screen flex items-center justify-center bg-dark-bg px-4">
        <div className="rounded-[32px] border border-dark-border bg-dark-panel p-10 shadow-premium text-center">
          <div className="mx-auto h-14 w-14 rounded-2xl border border-dark-border bg-dark-card flex items-center justify-center text-brand text-xl">
            <i className="fa-solid fa-spinner fa-spin"></i>
          </div>
          <div className="mt-5 text-lg font-bold">Authenticating...</div>
        </div>
      </div>
    );

    const Login = ({ onLogin, error }) => {
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [submitting, setSubmitting] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setSubmitting(true);
        try { await onLogin(email, password); } 
        finally { setSubmitting(false); }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4 fade-in bg-dark-bg">
          <div className="w-full max-w-sm bg-dark-panel border border-dark-border p-10 rounded-[40px] shadow-premium text-center">
            <div className="bg-brand text-white font-black w-16 h-16 flex items-center justify-center text-3xl rounded-2xl mx-auto mb-8 shadow-2xl">E2</div>
            <h2 className="text-2xl font-black mb-8 tracking-tight">E2hub Portal</h2>
            {error && <p className="text-brand text-xs font-bold mb-6 bg-brand/10 p-3 rounded-xl border border-brand/20">{error}</p>}
            
            <form onSubmit={handleSubmit} className="space-y-4">
              <input type="email" placeholder="Supabase Email" className="w-full bg-dark-bg border border-dark-border p-4 rounded-2xl outline-none focus:border-brand transition" onChange={e => setEmail(e.target.value)} required />
              <input type="password" placeholder="Password" className="w-full bg-dark-bg border border-dark-border p-4 rounded-2xl outline-none focus:border-brand transition" onChange={e => setPassword(e.target.value)} required />
              <button type="submit" disabled={submitting} className="w-full bg-brand p-4 rounded-2xl font-black text-sm uppercase tracking-widest hover:bg-brand-hover disabled:opacity-60 transition shadow-xl mt-4">
                {submitting ? "Signing In..." : "Sign In"}
              </button>
            </form>
          </div>
        </div>
      );
    };

    const TopNav = ({ currentUser, setView, onLogout }) => (
      <nav className="border-b border-dark-border bg-dark-panel p-5 sticky top-0 z-50">
        <div className="max-w-[1600px] mx-auto flex justify-between items-center">
          <div className="flex items-center gap-4 cursor-pointer" onClick={() => setView('dashboard')}>
            <div className="bg-brand text-white font-black px-3 py-1 rounded-lg text-xl tracking-tighter">E2</div>
            <div className="hidden sm:block">
              <p className="font-black text-lg leading-none tracking-tight">E2HUB</p>
              <p className="text-[10px] text-neutral-500 font-bold tracking-[0.2em] uppercase">Internal Portal</p>
            </div>
          </div>
          <div className="flex items-center gap-4">
            {currentUser?.can_manage_users && (
              <button onClick={() => setView('admin')} className="text-xs bg-dark-bg border border-dark-border px-5 py-2.5 rounded-xl hover:border-brand transition font-bold text-neutral-300">Admin Panel</button>
            )}
            <button onClick={onLogout} className="text-xs bg-brand text-white border border-brand px-5 py-2.5 rounded-xl hover:bg-brand-hover transition font-bold">Sign Out</button>
          </div>
        </div>
      </nav>
    );

    const ProjectView = ({ onBack }) => (
      <div className="fade-in py-6">
        <button onClick={onBack} className="mb-6 flex items-center gap-2 text-sm font-bold text-neutral-500 hover:text-white transition">
          <i className="fa-solid fa-arrow-left"></i> Back to Dashboard
        </button>
        <h2 className="text-3xl font-black mb-8 tracking-tight">Project Workspaces</h2>
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          {PROJECTS_LIST.map((name, i) => (
            <div key={i} className="project-card rounded-[32px] p-8 group">
              <div className="flex justify-between items-start mb-6">
                <div className="h-12 w-12 bg-dark-bg rounded-xl border border-dark-border flex items-center justify-center text-xl text-neutral-500 group-hover:text-brand transition">
                  <i className="fa-solid fa-diagram-project"></i>
                </div>
                <span className="text-[10px] font-black uppercase tracking-widest bg-brand/10 text-brand px-3 py-1 rounded-full border border-brand/20">PRJ-{i+1}</span>
              </div>
              <h3 className="text-lg font-bold mb-4">{name}</h3>
              <div className="pt-6 border-t border-dark-border flex items-center justify-between">
                <span className="text-[11px] font-bold text-neutral-500 uppercase tracking-widest italic">Details Available Soon</span>
                <i className="fa-solid fa-lock text-neutral-700 text-xs"></i>
              </div>
            </div>
          ))}
        </div>
      </div>
    );

    const Dashboard = ({ user, links, onOpenProjects }) => {
      const handleOpen = (id) => {
        if (id === 'project_status') onOpenProjects();
        else window.open(links[id], '_blank', 'noopener,noreferrer');
      };

      const allowedSections = SECTIONS.filter(s => user.permissions.includes(s.id));

      return (
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 fade-in py-10">
          {allowedSections.map(s => (
            <div key={s.id} onClick={() => handleOpen(s.id)} className="bg-dark-card border border-dark-border p-8 rounded-[32px] hover:border-brand/40 transition-all group cursor-pointer">
              <div className="h-14 w-14 bg-dark-bg rounded-2xl flex items-center justify-center text-2xl text-neutral-500 group-hover:text-brand transition mb-6">
                <i className={`fa-solid ${s.icon}`}></i>
              </div>
              <h3 className="text-lg font-bold mb-8">{s.title}</h3>
              <div className="text-[10px] font-black uppercase tracking-widest text-neutral-500 group-hover:text-brand transition">Click to Access <i className="fa-solid fa-arrow-right ml-1"></i></div>
            </div>
          ))}
        </div>
      );
    };

    // --- ADMIN COMPONENTS ---
    const PermissionPill = ({ active, label, onToggle }) => (
      <button type="button" onClick={onToggle} className={`inline-flex items-center gap-2 rounded-full border px-3 py-2 text-sm transition ${active ? "border-brand/25 bg-brand/10 text-white" : "border-dark-border bg-dark-bg text-neutral-400 hover:text-white"}`}>
        <span className={`h-2.5 w-2.5 rounded-full ${active ? "bg-brand" : "bg-neutral-600"}`}></span>{label}
      </button>
    );

    const UsersTable = ({ users }) => (
      <div className="rounded-[28px] border border-dark-border bg-dark-card p-6 shadow-soft">
        <div className="mb-6"><h3 className="text-xl font-bold tracking-tight">Supabase User Directory</h3></div>
        <div className="overflow-x-auto">
          <table className="min-w-full border-separate border-spacing-y-2">
            <thead>
              <tr className="text-left text-xs uppercase tracking-[0.18em] text-neutral-500">
                <th className="px-4 py-3 font-bold">User</th>
                <th className="px-4 py-3 font-bold">Role</th>
                <th className="px-4 py-3 font-bold">Permissions</th>
              </tr>
            </thead>
            <tbody>
              {users.map(user => (
                <tr key={user.id} className="bg-dark-bg hover:bg-dark-soft transition">
                  <td className="rounded-l-2xl px-4 py-4 align-top">
                    <div className="font-semibold text-white">{user.full_name || "No name"}</div>
                    <div className="mt-1 text-xs text-neutral-500">{user.email || "Auth email hidden"}</div>
                  </td>
                  <td className="px-4 py-4 align-top">
                    <span className={`inline-flex rounded-full border px-3 py-1 text-xs font-bold uppercase tracking-[0.14em] ${user.role === "Admin" ? "border-brand/25 bg-brand/10 text-brand" : "border-dark-border bg-dark-card text-neutral-300"}`}>{user.role}</span>
                  </td>
                  <td className="rounded-r-2xl px-4 py-4 align-top">
                    <div className="flex flex-wrap gap-2">
                      {user.permissions.map(permission => <span key={permission} className="inline-flex rounded-full border border-dark-border bg-dark-card px-3 py-1 text-xs text-neutral-300">{getSectionTitle(permission)}</span>)}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    );

    const ProfileEditor = ({ setNotice, refreshAll }) => {
      const defaultPermissions = SECTIONS.map(s => s.id);
      const [form, setForm] = useState({ userId: "", full_name: "", role: "User", can_manage_users: false, permissions: defaultPermissions });
      const [saving, setSaving] = useState(false);

      const togglePermission = (id) => setForm(prev => ({ ...prev, permissions: prev.permissions.includes(id) ? prev.permissions.filter(p => p !== id) : [...prev.permissions, id] }));

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!form.userId.trim()) { setNotice({ type: "error", text: "Please enter the Supabase auth user UUID." }); return; }
        setSaving(true);
        try {
          const payload = {
            id: form.userId.trim(), full_name: form.full_name.trim() || null, role: form.role, can_manage_users: !!form.can_manage_users,
            quotation_received: form.permissions.includes("quotation_received"), quotation_breakdown: form.permissions.includes("quotation_breakdown"),
            inventory: form.permissions.includes("inventory"), project_status: form.permissions.includes("project_status")
          };
          const { error } = await supabaseClient.from("user_profiles").upsert(payload);
          if (error) throw error;
          setNotice({ type: "success", text: "Profile saved successfully." });
          setForm({ userId: "", full_name: "", role: "User", can_manage_users: false, permissions: defaultPermissions });
          await refreshAll();
        } catch (err) { setNotice({ type: "error", text: err.message }); } 
        finally { setSaving(false); }
      };

      return (
        <div className="rounded-[28px] border border-dark-border bg-dark-card p-6 shadow-soft">
          <div className="mb-6"><h3 className="text-xl font-bold tracking-tight">Add / Update Profile</h3></div>
          <form onSubmit={handleSubmit} className="space-y-4">
            <input type="text" value={form.userId} onChange={e => setForm({ ...form, userId: e.target.value })} className="w-full rounded-2xl border border-dark-border bg-dark-bg px-4 py-3 text-white outline-none focus:border-brand" placeholder="Paste auth.users UUID" />
            <input type="text" value={form.full_name} onChange={e => setForm({ ...form, full_name: e.target.value })} className="w-full rounded-2xl border border-dark-border bg-dark-bg px-4 py-3 text-white outline-none focus:border-brand" placeholder="Enter full name" />
            <select value={form.role} onChange={e => setForm({ ...form, role: e.target.value })} className="w-full rounded-2xl border border-dark-border bg-dark-bg px-4 py-3 text-white outline-none focus:border-brand">
              <option>User</option><option>Admin</option>
            </select>
            <label className="flex items-center gap-3 rounded-2xl border border-dark-border bg-dark-bg px-4 py-3 cursor-pointer">
              <input type="checkbox" checked={form.can_manage_users} onChange={e => setForm({ ...form, can_manage_users: e.target.checked })} className="h-4 w-4 accent-red-600" />
              <span className="text-sm text-white">Can manage users and links</span>
            </label>
            <div className="rounded-2xl border border-dark-border bg-dark-bg p-4 flex flex-wrap gap-2">
              {SECTIONS.map(s => <PermissionPill key={s.id} label={s.title} active={form.permissions.includes(s.id)} onToggle={() => togglePermission(s.id)} />)}
            </div>
            <button type="submit" disabled={saving} className="w-full rounded-2xl bg-brand hover:bg-brand-hover disabled:opacity-60 px-4 py-3 font-bold text-white transition">{saving ? "Saving..." : "Save Profile"}</button>
          </form>
        </div>
      );
    };

    const LinksManager = ({ links, setNotice, refreshAll }) => {
      const [draftLinks, setDraftLinks] = useState(links);
      const [saving, setSaving] = useState(false);
      useEffect(() => { setDraftLinks(links); }, [links]);

      const handleSave = async () => {
        setSaving(true);
        try {
          const rows = Object.entries(draftLinks).map(([section_key, url]) => ({ section_key, url }));
          const { error } = await supabaseClient.from("portal_links").upsert(rows, { onConflict: "section_key" });
          if (error) throw error;
          setNotice({ type: "success", text: "Links updated successfully." });
          await refreshAll();
        } catch (err) { setNotice({ type: "error", text: err.message }); } 
        finally { setSaving(false); }
      };

      return (
        <div className="grid grid-cols-1 gap-6 xl:grid-cols-[minmax(0,1fr)_320px]">
          <div className="rounded-[28px] border border-dark-border bg-dark-card p-6 shadow-soft">
            <h3 className="text-xl font-bold tracking-tight mb-6">Database Links</h3>
            <div className="grid grid-cols-1 gap-5 lg:grid-cols-2">
              {SECTIONS.filter(s => s.id !== 'project_status').map(section => (
                <div key={section.id} className="rounded-2xl border border-dark-border bg-dark-bg p-4">
                  <div className="font-semibold text-white mb-2">{section.title}</div>
                  <input type="text" value={draftLinks[section.id] || ""} onChange={e => setDraftLinks({ ...draftLinks, [section.id]: e.target.value })} placeholder="URL" className="w-full rounded-2xl border border-dark-border bg-dark-card px-4 py-3 text-sm text-neutral-300 outline-none focus:border-brand" />
                </div>
              ))}
            </div>
            <button onClick={handleSave} disabled={saving} className="mt-6 rounded-2xl bg-brand hover:bg-brand-hover disabled:opacity-60 px-5 py-3 text-sm font-bold text-white transition">{saving ? "Saving..." : "Save Links"}</button>
          </div>
        </div>
      );
    };

    const AdminPanel = ({ users, links, refreshAll }) => {
      const [activeTab, setActiveTab] = useState("users");
      const [notice, setNotice] = useState(null);

      return (
        <div className="space-y-8 fade-in">
          <div><h2 className="text-3xl font-black tracking-tight">Supabase Administration</h2></div>
          <div className="grid grid-cols-1 gap-5 md:grid-cols-3">
            <StatCard title="Total Profiles" value={users.length} icon="fa-users" accent="brand" />
            <StatCard title="Admin Accounts" value={users.filter(u => u.role === "Admin").length} icon="fa-user-shield" />
            <StatCard title="Managed Modules" value={SECTIONS.length} icon="fa-layer-group" />
          </div>
          <Notice notice={notice} />
          <div className="rounded-[28px] border border-dark-border bg-dark-card p-3 shadow-soft inline-flex gap-1">
            <button onClick={() => setActiveTab("users")} className={`rounded-2xl px-5 py-3 text-sm font-semibold transition ${activeTab === "users" ? "bg-brand text-white shadow-soft" : "text-neutral-500 hover:text-white"}`}>Manage Profiles</button>
            <button onClick={() => setActiveTab("links")} className={`rounded-2xl px-5 py-3 text-sm font-semibold transition ${activeTab === "links" ? "bg-brand text-white shadow-soft" : "text-neutral-500 hover:text-white"}`}>Manage Links</button>
          </div>
          {activeTab === "users" ? (
            <div className="grid grid-cols-1 gap-6 xl:grid-cols-[380px_minmax(0,1fr)]">
              <ProfileEditor setNotice={setNotice} refreshAll={refreshAll} />
              <UsersTable users={users} />
            </div>
          ) : <LinksManager links={links} setNotice={setNotice} refreshAll={refreshAll} />}
        </div>
      );
    };

    // --- MAIN APP COMPONENT ---
    const App = () => {
      const [loading, setLoading] = useState(true);
      const [authError, setAuthError] = useState("");
      const [sessionUser, setSessionUser] = useState(null);
      const [profile, setProfile] = useState(null);
      const [profiles, setProfiles] = useState([]);
      const [links, setLinks] = useState(DEFAULT_LINKS);
      const [view, setView] = useState("dashboard");

      const currentUser = useMemo(() => {
        if (!sessionUser || !profile) return null;
        return {
          id: sessionUser.id, email: sessionUser.email, full_name: profile.full_name, role: profile.role || "User",
          can_manage_users: !!profile.can_manage_users, permissions: profileToPermissions(profile)
        };
      }, [sessionUser, profile]);

      const loadPortalData = async (authUser) => {
        const { data: profileRow, error: profileError } = await supabaseClient.from("user_profiles").select("*").eq("id", authUser.id).single();
        if (profileError) throw profileError;
        setProfile(profileRow);

        const { data: linkRows, error: linksError } = await supabaseClient.from("portal_links").select("section_key, url");
        if (linksError) throw linksError;
        setLinks(normalizeLinks(linkRows));

        if (profileRow.can_manage_users) {
          const { data: profileRows } = await supabaseClient.from("user_profiles").select("*").order("created_at", { ascending: true });
          setProfiles((profileRows || []).map(row => ({ ...row, permissions: profileToPermissions(row) })));
        } else {
          setProfiles([]);
        }
      };

      const refreshAll = async () => {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (user) await loadPortalData(user);
      };

      useEffect(() => {
        let mounted = true;
        const bootstrap = async () => {
          try {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!mounted) return;
            if (session?.user) { setSessionUser(session.user); await loadPortalData(session.user); }
          } catch (err) { if (mounted) setAuthError(err.message); } 
          finally { if (mounted) setLoading(false); }
        };
        bootstrap();

        const { data: authListener } = supabaseClient.auth.onAuthStateChange(async (event, session) => {
          if (!mounted) return;
          if (session?.user) {
            setSessionUser(session.user);
            try { await loadPortalData(session.user); } catch (err) { setAuthError(err.message); }
          } else {
            setSessionUser(null); setProfile(null); setProfiles([]); setLinks(DEFAULT_LINKS);
          }
        });
        return () => { mounted = false; authListener.subscription.unsubscribe(); };
      }, []);

      const handleLogin = async (email, password) => {
        setAuthError("");
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) throw error;
      };

      const handleLogout = async () => {
        await supabaseClient.auth.signOut();
        setView("dashboard"); setAuthError("");
      };

      if (loading) return <LoadingScreen />;
      if (!currentUser) return <Login onLogin={handleLogin} error={authError} />;

      return (
        <div className="min-h-screen">
          <TopNav currentUser={currentUser} setView={setView} onLogout={handleLogout} />
          <main className="max-w-[1600px] mx-auto px-8 py-8">
            {view === "dashboard" ? <Dashboard user={currentUser} links={links} onOpenProjects={() => setView("projects")} /> 
            : view === "projects" ? <ProjectView onBack={() => setView("dashboard")} />
            : currentUser.can_manage_users ? <AdminPanel users={profiles} links={links} refreshAll={refreshAll} /> 
            : <Dashboard user={currentUser} links={links} onOpenProjects={() => setView("projects")} />}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
