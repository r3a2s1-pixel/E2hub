<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E2hub | Internal Portal</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="stylesheet" href="styles.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div id="toast-container" class="toast-container"></div>

  <div id="loading-view" class="view active min-h-screen flex-center">
    <div class="card text-center p-xl shadow-premium">
      <div class="loading-spinner mb-md"><i class="fa-solid fa-spinner fa-spin"></i></div>
      <div class="font-bold text-lg">Authenticating...</div>
      <div class="text-sm text-muted mt-sm">Checking session and loading profile</div>
    </div>
  </div>

  <div id="login-view" class="view min-h-screen flex-center">
    <div class="card p-xl shadow-premium max-w-sm w-full text-center">
      <div class="logo-box mx-auto mb-lg">E2</div>
      <h2 class="text-2xl font-black mb-xl">E2hub Portal</h2>
      
      <form id="login-form">
        <input type="email" id="login-email" placeholder="Supabase Email" required class="input-field mb-sm" />
        <input type="password" id="login-password" placeholder="Password" required class="input-field mb-md" />
        <button type="submit" id="login-btn" class="btn btn-primary w-full">Sign In</button>
      </form>
    </div>
  </div>

  <div id="app-view" class="view min-h-screen">
    <nav class="top-nav">
      <div class="nav-container max-w-container mx-auto flex-between">
        <div class="flex-align gap-md cursor-pointer" id="nav-logo-btn">
          <div class="logo-box-small">E2</div>
          <div class="hidden-sm">
            <div class="font-black text-lg">E2HUB</div>
            <div class="text-xxs text-muted tracking-widest uppercase">Internal Portal</div>
          </div>
        </div>
        <div class="flex-align gap-md">
          <button id="nav-admin-btn" class="btn btn-outline hidden">Admin Panel</button>
          <button id="nav-logout-btn" class="btn btn-primary">Sign Out</button>
        </div>
      </div>
    </nav>

    <main class="max-w-container mx-auto p-xl">
      
      <section id="dashboard-section" class="section active fade-in">
        <div class="grid grid-cols-1 md-grid-cols-2 lg-grid-cols-4 gap-lg py-xl" id="dashboard-grid">
          </div>
      </section>

      <section id="projects-section" class="section fade-in">
        <button class="btn btn-text mb-lg" id="back-to-dashboard-btn">
          <i class="fa-solid fa-arrow-left mr-sm"></i> Back to Dashboard
        </button>
        <h2 class="text-3xl font-black mb-xl">Project Workspaces</h2>
        <div class="grid grid-cols-1 md-grid-cols-2 lg-grid-cols-3 gap-lg" id="projects-grid">
          </div>
      </section>

      <section id="admin-section" class="section fade-in">
        <h2 class="text-3xl font-black mb-md">Supabase Administration</h2>
        
        <div class="grid grid-cols-1 md-grid-cols-3 gap-lg mb-xl">
          <div class="card p-md flex-between">
            <div><p class="text-sm text-muted">Total Profiles</p><p class="text-2xl font-bold mt-xs" id="stat-total-users">0</p></div>
            <div class="icon-box brand"><i class="fa-solid fa-users"></i></div>
          </div>
          <div class="card p-md flex-between">
            <div><p class="text-sm text-muted">Admin Accounts</p><p class="text-2xl font-bold mt-xs" id="stat-admin-users">0</p></div>
            <div class="icon-box"><i class="fa-solid fa-user-shield"></i></div>
          </div>
          <div class="card p-md flex-between">
            <div><p class="text-sm text-muted">Managed Modules</p><p class="text-2xl font-bold mt-xs" id="stat-modules">4</p></div>
            <div class="icon-box"><i class="fa-solid fa-layer-group"></i></div>
          </div>
        </div>

        <div class="tab-container mb-lg">
          <button class="tab-btn active" data-target="admin-users-tab">Manage Profiles</button>
          <button class="tab-btn" data-target="admin-links-tab">Manage Links</button>
        </div>

        <div id="admin-users-tab" class="admin-tab active grid grid-cols-1 xl-grid-cols-[380px_1fr] gap-lg">
          <div class="card p-lg">
            <h3 class="text-xl font-bold mb-md">Add / Update Profile</h3>
            <form id="admin-user-form">
              <input type="text" id="form-uid" placeholder="Paste auth.users UUID" required class="input-field mb-sm" />
              <input type="text" id="form-name" placeholder="Enter full name" class="input-field mb-sm" />
              <select id="form-role" class="input-field mb-sm">
                <option value="User">User</option>
                <option value="Admin">Admin</option>
              </select>
              
              <label class="flex-align gap-sm p-sm bg-dark border-dark rounded-md cursor-pointer mb-md">
                <input type="checkbox" id="form-manage-users" class="checkbox-custom" />
                <span class="text-sm">Can manage users and links</span>
              </label>

              <div class="bg-dark border-dark p-md rounded-md mb-lg">
                <div class="text-sm font-bold mb-sm">Permissions</div>
                <div class="flex-wrap gap-sm" id="form-permissions-container">
                  </div>
              </div>
              <button type="submit" class="btn btn-primary w-full" id="save-profile-btn">Save Profile</button>
            </form>
          </div>

          <div class="card p-lg overflow-x-auto">
            <h3 class="text-xl font-bold mb-md">User Directory</h3>
            <table class="w-full text-left table-auto">
              <thead>
                <tr class="text-xs uppercase tracking-widest text-muted border-b border-dark">
                  <th class="py-md">User</th>
                  <th class="py-md">Role</th>
                  <th class="py-md">Permissions</th>
                </tr>
              </thead>
              <tbody id="users-table-body">
                </tbody>
            </table>
          </div>
        </div>

        <div id="admin-links-tab" class="admin-tab grid grid-cols-1 xl-grid-cols-[1fr_320px] gap-lg">
          <div class="card p-lg">
            <h3 class="text-xl font-bold mb-lg">Database Links</h3>
            <form id="admin-links-form">
              <div class="grid grid-cols-1 lg-grid-cols-2 gap-md" id="links-input-container">
                </div>
              <button type="submit" class="btn btn-primary mt-lg" id="save-links-btn">Save Links</button>
            </form>
          </div>
        </div>

      </section>
    </main>
  </div>

 <script src="portal-app.js"></script>
</body>
</html>
