<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E2hub | Internal Portal</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              DEFAULT: "#e50914",
              hover: "#b80710",
              soft: "#2d0f12"
            },
            dark: {
              bg: "#0a0a0a",
              panel: "#111111",
              card: "#151515",
              soft: "#1b1b1b",
              border: "#262626"
            }
          },
          boxShadow: {
            soft: "0 10px 30px rgba(0,0,0,0.20)",
            premium: "0 24px 70px rgba(0,0,0,0.35)"
          },
          fontFamily: {
            sans: ["Inter", "sans-serif"]
          }
        }
      }
    };
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body { background-color: #0a0a0a; color: #ffffff; font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: #262626; border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }

    .fade-in { animation: fadeIn .25s ease-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const USERS_STORAGE_KEY = "e2hub_portal_users_v4";
    const LINKS_STORAGE_KEY = "e2hub_portal_links_v4";

    const SECTIONS = [
      {
        id: "quotation_received",
        title: "Quotation Received",
        icon: "fa-envelope-open-text",
        desc: "Centralized repository for client requests, incoming quotations, and initial project documentation.",
        action: "Access Files",
        badge: "Sales"
      },
      {
        id: "quotation_breakdown",
        title: "Cost Analysis & Invoicing",
        icon: "fa-file-invoice-dollar",
        desc: "Detailed financial breakdowns, pricing sheets, and invoice management for commercial operations.",
        action: "View Breakdown",
        badge: "Finance"
      },
      {
        id: "inventory",
        title: "Inventory Control",
        icon: "fa-boxes-stacked",
        desc: "Real-time tracking of stock levels, materials, warehouse records, and logistics references.",
        action: "Manage Stock",
        badge: "Warehouse"
      },
      {
        id: "project_status",
        title: "Project Milestones",
        icon: "fa-bars-progress",
        desc: "Consolidated view of project workspaces, timelines, active delivery stages, and status monitoring.",
        action: "Open Workspace",
        badge: "PMO"
      }
    ];

    const PROJECTS_LIST = [
      "01-LULU ICAD Musaffah",
      "02-Y Tower Capital centre (ADNEC)",
      "03-Pixel Tower Reem",
      "04- LULU Hypermarket(MBZ)",
      "05-Y Tower - Al Nahyan - LuLu",
      "06-AL Falah Plaza Residentaial complex",
      "07- Y Tower Reem",
      "08-Forsan central mall",
      "09-Village mall",
      "10- Workers village"
    ];

    const DEFAULT_USERS = [
      {
        id: 1,
        name: "System Admin",
        username: "admin",
        password: "E2hub@123",
        role: "Admin",
        permissions: SECTIONS.map(section => section.id)
      }
    ];

    const DEFAULT_LINKS = {
      quotation_received: "https://eumeconn-my.sharepoint.com/:f:/g/personal/mur_eumecon_ae/IgAPlhb8DCDaTZrB4UO3uEZPAeakBCVbYYxSNR3lBC_lae0?e=OKv4nz",
      quotation_breakdown: "https://eumeconn-my.sharepoint.com/:x:/g/personal/mur_eumecon_ae/IQAm8ZTtLMvkTLT09nEXPpXZAZY-QBduU8vIkv0phmrVIQ0",
      inventory: "https://eumeconn-my.sharepoint.com/:x:/g/personal/mur_eumecon_ae/IQCRw7fzXtuTRp-Gc88IMfzkAWkcBv0AOhzO6ORiLMER29Y",
      project_status: "#"
    };

    function loadFromStorage(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch {
        return fallback;
      }
    }

    function saveToStorage(key, value) {
      try {
        localStorage.setItem(key, JSON.stringify(value));
      } catch {}
    }

    function getInitials(name) {
      return name
        .split(" ")
        .slice(0, 2)
        .map(word => word[0]?.toUpperCase() || "")
        .join("");
    }

    function BrandLogo() {
      return (
        <div className="flex items-center gap-3">
          <div className="h-11 w-11 rounded-2xl bg-brand flex items-center justify-center shadow-soft">
            <span className="text-white font-black text-lg">E2</span>
          </div>
          <div className="text-left">
            <div className="text-xl font-extrabold tracking-tight">E2hub</div>
            <div className="text-[11px] uppercase tracking-[0.22em] text-neutral-500 font-bold">
              Internal Portal
            </div>
          </div>
        </div>
      );
    }

    function Notice({ notice }) {
      if (!notice) return null;
      const tone = notice.type === "error" ? "border-red-500/30 bg-red-950/40 text-red-200" : "border-emerald-500/30 bg-emerald-950/30 text-emerald-200";
      const icon = notice.type === "error" ? "fa-circle-exclamation" : "fa-circle-check";
      return (
        <div className={`rounded-2xl border px-4 py-3 text-sm ${tone}`}>
          <i className={`fa-solid ${icon} mr-2`}></i>{notice.text}
        </div>
      );
    }

    // SIMPLIFIED LOGIN COMPONENT
    function Login({ onLogin, error }) {
      const [username, setUsername] = useState("");
      const [password, setPassword] = useState("");
      const [showPassword, setShowPassword] = useState(false);

      const handleSubmit = (e) => {
        e.preventDefault();
        onLogin(username, password);
      };

      return (
        <div className="min-h-screen flex items-center justify-center bg-dark-bg p-4 fade-in">
          <div className="w-full max-w-sm rounded-[32px] border border-dark-border bg-dark-panel p-8 sm:p-10 shadow-premium">
            <div className="mb-8 flex flex-col items-center text-center">
              <div className="h-14 w-14 rounded-2xl bg-brand flex items-center justify-center shadow-soft mb-4">
                <span className="text-white font-black text-2xl">E2</span>
              </div>
              <h2 className="text-2xl font-black tracking-tight">E2hub Portal</h2>
              <p className="mt-2 text-sm text-neutral-400">Secure internal access</p>
            </div>

            {error && (
              <div className="mb-5 rounded-2xl border border-red-500/30 bg-red-950/40 px-4 py-3 text-sm text-red-200 text-center">
                <i className="fa-solid fa-circle-exclamation mr-2"></i>{error}
              </div>
            )}

            <form onSubmit={handleSubmit} className="space-y-4">
              <div>
                <input
                  type="text"
                  value={username}
                  onChange={(e) => setUsername(e.target.value)}
                  placeholder="Username"
                  className="w-full rounded-2xl border border-dark-border bg-dark-bg px-4 py-3.5 text-white outline-none transition focus:border-brand"
                  required
                />
              </div>

              <div className="relative">
                <input
                  type={showPassword ? "text" : "password"}
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  placeholder="Password"
                  className="w-full rounded-2xl border border-dark-border bg-dark-bg px-4 py-3.5 pr-12 text-white outline-none transition focus:border-brand"
                  required
                />
                <button
                  type="button"
                  onClick={() => setShowPassword(!showPassword)}
                  className="absolute right-4 top-1/2 -translate-y-1/2 text-neutral-500 hover:text-white transition"
                >
                  <i className={`fa-solid ${showPassword ? "fa-eye-slash" : "fa-eye"}`}></i>
                </button>
              </div>

              <button type="submit" className="mt-2 w-full rounded-2xl bg-brand hover:bg-brand-hover px-4 py-3.5 font-bold text-white transition shadow-soft">
                Sign In
              </button>
            </form>
          </div>
        </div>
      );
    }

    function TopNav({ currentUser, view, setView, onLogout }) {
      return (
        <nav className="sticky top-0 z-30 border-b border-dark-border bg-dark-panel/95 backdrop-blur">
          <div className="mx-auto flex w-full max-w-[1600px] items-center justify-between gap-4 px-4 py-4 md:px-8">
            <div className="flex items-center gap-6 md:gap-10">
              <button onClick={() => setView("dashboard")} className="text-left">
                <BrandLogo />
              </button>

              <div className="hidden md:flex items-center rounded-2xl border border-dark-border bg-dark-bg p-1">
                <button onClick={() => setView("dashboard")} className={`rounded-xl px-4 py-2.5 text-sm font-semibold transition ${view === "dashboard" ? "bg-dark-card text-white shadow-soft" : "text-neutral-500 hover:text-white"}`}>
                  Overview
                </button>
                {currentUser.role === "Admin" && (
                  <button onClick={() => setView("admin")} className={`rounded-xl px-4 py-2.5 text-sm font-semibold transition ${view === "admin" ? "bg-dark-card text-brand shadow-soft" : "text-neutral-500 hover:text-white"}`}>
                    Admin Panel
                  </button>
                )}
              </div>
            </div>

            <div className="flex items-center gap-3 md:gap-5">
              <div className="hidden sm:block text-right">
                <p className="text-sm font-semibold text-white">{currentUser.name}</p>
                <p className="text-[11px] uppercase tracking-[0.22em] text-brand font-bold">{currentUser.role} Access</p>
              </div>
              <div className="h-11 w-11 rounded-full border border-dark-border bg-dark-bg flex items-center justify-center text-neutral-400">
                <span className="text-sm font-bold">{getInitials(currentUser.name)}</span>
              </div>
              <button onClick={onLogout} className="inline-flex items-center gap-2 rounded-2xl border border-dark-border bg-dark-bg px-4 py-2.5 text-sm font-medium text-neutral-300 transition hover:border-brand hover:text-white">
                <i className="fa-solid fa-right-from-bracket"></i>
                <span className="hidden sm:inline">Sign Out</span>
              </button>
            </div>
          </div>
        </nav>
      );
    }

    function SectionCard({ section, link, onOpenProjects }) {
      const isProjectWorkspace = section.id === "project_status" && (!link || link === "#");
      return (
        <div className="group rounded-[28px] border border-dark-border bg-dark-card p-6 shadow-soft transition duration-200 hover:-translate-y-1 hover:border-brand/30 hover:shadow-premium flex flex-col h-full">
          <div className="flex items-start justify-between gap-4">
            <div className="h-14 w-14 rounded-2xl border border-dark-border bg-dark-bg flex items-center justify-center text-xl text-neutral-300 group-hover:text-brand transition">
              <i className={`fa-solid ${section.icon}`}></i>
            </div>
          </div>
          <h3 className="mt-6 text-xl font-bold tracking-tight">{section.title}</h3>
          <p className="mt-3 text-sm leading-6 text-neutral-500 flex-grow">{section.desc}</p>
          <div className="mt-7">
            {isProjectWorkspace ? (
              <button onClick={onOpenProjects} className="inline-flex w-full items-center justify-center gap-3 rounded-2xl border border-dark-border bg-dark-bg px-4 py-3 text-sm font-semibold text-white transition hover:border-brand hover:text-white">
                <i className="fa-solid fa-arrow-right text-neutral-500 group-hover:text-brand transition"></i>
                {section.action}
              </button>
            ) : (
              <a href={link} target="_blank" rel="noopener noreferrer" className="inline-flex w-full items-center justify-center gap-3 rounded-2xl border border-dark-border bg-dark-bg px-4 py-3 text-sm font-semibold text-white transition hover:border-brand hover:text-white">
                <i className="fa-solid fa-arrow-up-right-from-square text-neutral-500 group-hover:text-brand transition"></i>
                {section.action}
              </a>
            )}
          </div>
        </div>
      );
    }

    // SIMPLIFIED PROJECT WORKSPACE COMPONENT
    function ProjectsWorkspace({ onBack }) {
      return (
        <div className="space-y-6 fade-in">
          <div className="mb-8">
            <button onClick={onBack} className="mb-4 inline-flex items-center gap-2 text-sm font-semibold text-neutral-500 transition hover:text-white">
              <i className="fa-solid fa-arrow-left"></i> Back to Dashboard
            </button>
            <p className="text-neutral-400">Detailed view of all upcoming and ongoing project tracking folders.</p>
          </div>

          <div className="grid grid-cols-1 gap-4 lg:grid-cols-2">
            {PROJECTS_LIST.map((project, index) => (
              <div key={index} className="flex items-center justify-between rounded-[20px] border border-dark-border bg-dark-card px-6 py-5 transition hover:border-brand/30">
                <div className="flex items-center gap-4">
                  <i className="fa-solid fa-folder text-brand text-2xl"></i>
                  <span className="font-semibold text-white tracking-tight">{project}</span>
                </div>
                <div className="flex items-center gap-2 rounded-full border border-dark-border bg-dark-bg px-4 py-2 text-sm text-neutral-400">
                  <i className="fa-regular fa-clock text-[12px]"></i>
                  <span className="text-xs font-medium">Soon Available</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // SIMPLIFIED DASHBOARD COMPONENT
    function Dashboard({ user, links }) {
      const [viewingProjects, setViewingProjects] = useState(false);
      const userSections = useMemo(() => SECTIONS.filter(section => user.permissions.includes(section.id)), [user]);

      if (viewingProjects) {
        return <ProjectsWorkspace onBack={() => setViewingProjects(false)} />;
      }

      return (
        <div className="fade-in">
          <div className="grid grid-cols-1 gap-6 md:grid-cols-2 lg:grid-cols-4">
            {userSections.map(section => (
              <SectionCard key={section.id} section={section} link={links[section.id]} onOpenProjects={() => setViewingProjects(true)} />
            ))}
          </div>
        </div>
      );
    }

    // ADMIN COMPONENTS
    function PermissionPill({ active, label, onToggle }) {
      return (
        <button type="button" onClick={onToggle} className={`inline-flex items-center gap-2 rounded-full border px-3 py-2 text-sm transition ${active ? "border-brand/25 bg-brand/10 text-white" : "border-dark-border bg-dark-bg text-neutral-400 hover:text-white"}`}>
          <span className={`h-2.5 w-2.5 rounded-full ${active ? "bg-brand" : "bg-neutral-600"}`}></span>{label}
        </button>
      );
    }

    function UserForm({ onCreateUser, setNotice }) {
      const defaultPermissions = SECTIONS.map(section => section.id);
      const [form, setForm] = useState({ name: "", username: "", password: "", role: "User", permissions: defaultPermissions });

      const togglePermission = (id) => setForm(prev => ({ ...prev, permissions: prev.permissions.includes(id) ? prev.permissions.filter(p => p !== id) : [...prev.permissions, id] }));

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!form.name.trim() || !form.username.trim() || !form.password.trim()) { setNotice({ type: "error", text: "Please fill in all required fields." }); return; }
        const role = form.role === "Admin" ? "Admin" : "User";
        const permissions = role === "Admin" ? defaultPermissions : form.permissions;
        onCreateUser({ id: Date.now(), name: form.name.trim(), username: form.username.trim(), password: form.password, role, permissions });
        setForm({ name: "", username: "", password: "", role: "User", permissions: defaultPermissions });
      };

      const isAdmin = form.role === "Admin";

      return (
        <div className="rounded-[28px] border border-dark-border bg-dark-card p-6 shadow-soft">
          <div className="mb-6">
            <h3 className="text-xl font-bold tracking-tight">Create User</h3>
          </div>
          <form onSubmit={handleSubmit} className="space-y-4">
            <div>
              <input type="text" value={form.name} onChange={(e) => setForm({ ...form, name: e.target.value })} className="w-full rounded-2xl border border-dark-border bg-dark-bg px-4 py-3 text-white outline-none focus:border-brand" placeholder="Full name" />
            </div>
            <div>
              <input type="text" value={form.username} onChange={(e) => setForm({ ...form, username: e.target.value })} className="w-full rounded-2xl border border-dark-border bg-dark-bg px-4 py-3 text-white outline-none focus:border-brand" placeholder="Username" />
            </div>
            <div>
              <input type="text" value={form.password} onChange={(e) => setForm({ ...form, password: e.target.value })} className="w-full rounded-2xl border border-dark-border bg-dark-bg px-4 py-3 text-white outline-none focus:border-brand" placeholder="Password" />
            </div>
            <div>
              <select value={form.role} onChange={(e) => setForm({ ...form, role: e.target.value })} className="w-full rounded-2xl border border-dark-border bg-dark-bg px-4 py-3 text-white outline-none focus:border-brand">
                <option>User</option>
                <option>Admin</option>
              </select>
            </div>
            <div className="rounded-2xl border border-dark-border bg-dark-bg p-4">
              <div className="mb-3 flex items-center justify-between gap-3">
                <p className="text-sm font-semibold text-white">Permissions</p>
                <div className="rounded-full border border-dark-border bg-dark-card px-3 py-1 text-xs font-bold uppercase tracking-[0.18em] text-neutral-500">
                  {isAdmin ? "All Access" : `${form.permissions.length} Selected`}
                </div>
              </div>
              <div className="flex flex-wrap gap-2">
                {SECTIONS.map(section => <PermissionPill key={section.id} label={section.title} active={isAdmin || form.permissions.includes(section.id)} onToggle={() => !isAdmin && togglePermission(section.id)} />)}
              </div>
            </div>
            <button type="submit" className="w-full rounded-2xl bg-brand hover:bg-brand-hover px-4 py-3 font-bold text-white transition">Create User</button>
          </form>
        </div>
      );
    }

    function UsersTable({ users, onDeleteUser }) {
      return (
        <div className="rounded-[28px] border border-dark-border bg-dark-card p-6 shadow-soft">
          <div className="mb-6 flex items-center justify-between">
            <h3 className="text-xl font-bold tracking-tight">User Directory</h3>
          </div>
          <div className="overflow-x-auto">
            <table className="min-w-full border-separate border-spacing-y-2">
              <thead>
                <tr className="text-left text-xs uppercase tracking-[0.18em] text-neutral-500">
                  <th className="px-4 py-3 font-bold">User</th>
                  <th className="px-4 py-3 font-bold">Role</th>
                  <th className="px-4 py-3 font-bold text-right">Action</th>
                </tr>
              </thead>
              <tbody>
                {users.map(user => (
                  <tr key={user.id} className="bg-dark-bg hover:bg-dark-soft transition">
                    <td className="rounded-l-2xl px-4 py-4 align-middle">
                      <div className="font-semibold text-white">{user.name}</div>
                      <div className="text-xs text-neutral-500 font-mono">@{user.username}</div>
                    </td>
                    <td className="px-4 py-4 align-middle">
                      <span className={`inline-flex rounded-full border px-3 py-1 text-[10px] font-bold uppercase tracking-[0.14em] ${user.role === "Admin" ? "border-brand/25 bg-brand/10 text-brand" : "border-dark-border bg-dark-card text-neutral-400"}`}>
                        {user.role}
                      </span>
                    </td>
                    <td className="rounded-r-2xl px-4 py-4 align-middle text-right">
                      {user.username !== "admin" && (
                        <button onClick={() => onDeleteUser(user)} className="inline-flex items-center gap-2 rounded-xl border border-dark-border bg-dark-card px-3 py-2 text-xs text-neutral-400 hover:border-brand hover:text-white transition">
                          <i className="fa-solid fa-trash-can"></i> Delete
                        </button>
                      )}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function LinksManager({ links, setLinks, setNotice }) {
      const [draftLinks, setDraftLinks] = useState(links);
      useEffect(() => { setDraftLinks(links); }, [links]);
      const handleSave = () => { setLinks(draftLinks); setNotice({ type: "success", text: "Directory links updated successfully." }); };

      return (
        <div className="rounded-[28px] border border-dark-border bg-dark-card p-6 shadow-soft">
          <div className="mb-6"><h3 className="text-xl font-bold tracking-tight">Directory Links</h3></div>
          <div className="grid grid-cols-1 gap-5 lg:grid-cols-2">
            {SECTIONS.map(section => (
              <div key={section.id} className="rounded-2xl border border-dark-border bg-dark-bg p-4">
                <div className="font-semibold text-white mb-3">{section.title}</div>
                <input type="text" value={draftLinks[section.id] || ""} onChange={(e) => setDraftLinks({ ...draftLinks, [section.id]: e.target.value })} placeholder="Paste URL" className="w-full rounded-2xl border border-dark-border bg-dark-card px-4 py-3 text-sm text-neutral-300 outline-none focus:border-brand" />
              </div>
            ))}
          </div>
          <div className="mt-6 flex gap-3">
            <button onClick={handleSave} className="rounded-2xl bg-brand hover:bg-brand-hover px-5 py-3 text-sm font-bold text-white transition">Save All Links</button>
          </div>
        </div>
      );
    }

    function AdminPanel({ users, setUsers, links, setLinks }) {
      const [activeTab, setActiveTab] = useState("users");
      const [notice, setNotice] = useState(null);

      const handleCreateUser = (newUser) => {
        if (users.some(u => u.username.toLowerCase() === newUser.username.toLowerCase())) { setNotice({ type: "error", text: "Username already exists." }); return; }
        setUsers([...users, newUser]);
        setNotice({ type: "success", text: `User created successfully.` });
      };

      const handleDeleteUser = (userToDelete) => {
        if (userToDelete.username === "admin") return;
        setUsers(users.filter(u => u.id !== userToDelete.id));
        setNotice({ type: "success", text: `User deleted successfully.` });
      };

      return (
        <div className="space-y-6 fade-in">
          <Notice notice={notice} />
          <div className="rounded-[28px] border border-dark-border bg-dark-card p-3 shadow-soft inline-flex gap-1">
            <button onClick={() => setActiveTab("users")} className={`rounded-2xl px-5 py-3 text-sm font-semibold transition ${activeTab === "users" ? "bg-brand text-white shadow-soft" : "text-neutral-500 hover:text-white"}`}>Manage Users</button>
            <button onClick={() => setActiveTab("links")} className={`rounded-2xl px-5 py-3 text-sm font-semibold transition ${activeTab === "links" ? "bg-brand text-white shadow-soft" : "text-neutral-500 hover:text-white"}`}>Manage Links</button>
          </div>
          {activeTab === "users" ? (
            <div className="grid grid-cols-1 gap-6 xl:grid-cols-[350px_minmax(0,1fr)]">
              <UserForm onCreateUser={handleCreateUser} setNotice={setNotice} />
              <UsersTable users={users} onDeleteUser={handleDeleteUser} />
            </div>
          ) : (
            <LinksManager links={links} setLinks={setLinks} setNotice={setNotice} />
          )}
        </div>
      );
    }

    function App() {
      const [users, setUsers] = useState(() => loadFromStorage(USERS_STORAGE_KEY, DEFAULT_USERS));
      const [links, setLinks] = useState(() => loadFromStorage(LINKS_STORAGE_KEY, DEFAULT_LINKS));
      const [currentUser, setCurrentUser] = useState(null);
      const [view, setView] = useState("dashboard");
      const [error, setError] = useState("");

      useEffect(() => { saveToStorage(USERS_STORAGE_KEY, users); }, [users]);
      useEffect(() => { saveToStorage(LINKS_STORAGE_KEY, links); }, [links]);
      useEffect(() => { if (currentUser) { const ref = users.find(u => u.id === currentUser.id); ref ? setCurrentUser(ref) : setCurrentUser(null); } }, [users]);

      const handleLogin = (u, p) => {
        const foundUser = users.find(user => user.username === u && user.password === p);
        if (foundUser) { setCurrentUser(foundUser); setError(""); setView("dashboard"); } else { setError("Invalid username or password."); }
      };

      if (!currentUser) return <Login onLogin={handleLogin} error={error} />;

      return (
        <div className="min-h-screen bg-dark-bg text-white fade-in">
          <TopNav currentUser={currentUser} view={view} setView={setView} onLogout={() => { setCurrentUser(null); setView("dashboard"); setError(""); }} />
          <main className="mx-auto w-full max-w-[1600px] px-4 py-8 md:px-8 md:py-10">
            {view === "dashboard" ? <Dashboard user={currentUser} links={links} /> : currentUser.role === "Admin" ? <AdminPanel users={users} setUsers={setUsers} links={links} setLinks={setLinks} /> : <Dashboard user={currentUser} links={links} />}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
