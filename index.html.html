<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>E2hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: #1e293b;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      color: #38bdf8;
    }

    nav {
      margin-top: 10px;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: #38bdf8;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
    }

    .hero h2 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #cbd5f5;
      font-size: 18px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #38bdf8;
      color: black;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .section {
      padding: 40px 20px;
      text-align: center;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      width: 250px;
    }

    footer {
      background: #020617;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<header>
  <h1>E2hub</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Features</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Welcome to E2hub 🚀</h2>
  <p>Your website is now live on GitHub Pages</p>
  <a class="btn" href="#">Get Started</a>
</section>

<section class="section">
  <h2>Features</h2>
  <div class="cards">
    <div class="card">
      <h3>Fast</h3>
      <p>Hosted directly on GitHub</p>
    </div>
    <div class="card">
      <h3>Free</h3>
      <p>No cost hosting forever</p>
    </div>
    <div class="card">
      <h3>Easy</h3>
      <p>Just upload and publish</p>
    </div>
  </div>
</section>

<footer>
  <p>© 2026 E2hub. All rights reserved.</p>
</footer>

</body>
</html>
